server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend backend; 
        
        proxy_pass http://$upstream_backend:8080/;
        proxy_set_header Host $host;
    }
}